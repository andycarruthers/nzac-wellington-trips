<!DOCTYPE html>
<html>
<head><title>Netlify form detection</title></head>
<body>
<!-- Hidden form for Netlify detection — actual form is at /submit/ -->
<form name="trip-report" netlify netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="trip-report">
  <input name="bot-field">
  <input name="name">
  <input name="email">
  <input name="title">
  <input name="date">
  <input name="location">
  <input name="participants">
  <input name="tags">
  <textarea name="report"></textarea>
  <input name="photos_link">
</form>
</body>
</html>
